<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - ABC GLOBAL Church</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100%; scroll-behavior: smooth; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111827; /* Deep Dark Grey Background */
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; min-height: 100%; overflow: hidden;
            padding: 20px;
        }

        /* Subtle Red Ambient Glow */
        body::before {
            content: ''; position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(196, 30, 58, 0.15) 0%, transparent 70%);
            border-radius: 50%; top: 40%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 0;
            animation: breathe 6s ease-in-out infinite;
        }

        /* Vignette for premium cinematic feel */
        body::after {
            content: ''; position: fixed; inset: 0; 
            background: radial-gradient(circle at center, transparent 0%, #111827 90%);
            pointer-events: none; z-index: 1;
        }

        /* Main Container */
        .coming-soon-container {
            width: 100%; max-width: 500px; position: relative; z-index: 10;
            animation: fadeIn 1s ease-out forwards; opacity: 0;
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes breathe { 0%, 100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); } }

        /* Logo */
        .cs-logo {
            width: 70px; height: 70px; object-fit: contain; margin-bottom: 40px; display: block;
            filter: brightness(0) invert(1); /* Makes logo white for dark mode */
            opacity: 0.9;
        }

        /* Animated Progress Visual */
        .cs-progress-wrapper {
            display: flex; align-items: center; gap: 6px; margin-bottom: 30px;
        }
        .cs-dot {
            width: 6px; height: 6px; background: #4b5563; border-radius: 50%;
            animation: dotPulse 2s ease-in-out infinite;
        }
        .cs-dot.active { background: #C41E3A; box-shadow: 0 0 10px rgba(196, 30, 58, 0.5); }
        .cs-dot:nth-child(1) { animation-delay: 0s; }
        .cs-dot:nth-child(2) { animation-delay: 0.3s; }
        .cs-dot:nth-child(3) { animation-delay: 0.6s; }
        .cs-dot:nth-child(4) { animation-delay: 0.9s; }
        .cs-dot:nth-child(5) { animation-delay: 1.2s; }
        @keyframes dotPulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.5); } }

        /* Typography */
        .cs-title {
            font-family: 'Playfair Display', serif; font-size: 3.5rem; color: #F9FAFB;
            line-height: 1; margin-bottom: 15px; letter-spacing: -0.02em;
        }
        .cs-subtitle {
            font-weight: 800; font-size: 0.7rem; color: #C41E3A;
            text-transform: uppercase; letter-spacing: 0.3em; margin-bottom: 25px;
        }
        .cs-text {
            color: #9ca3af; font-size: 0.9rem; line-height: 1.7; font-weight: 400;
            max-width: 85%; margin-bottom: 40px;
        }

        /* Home Button (Ghost Style) */
        .home-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            padding: 14px 32px; background: transparent; color: #F9FAFB; 
            border: 1.5px solid rgba(255, 255, 255, 0.15); border-radius: 50px;
            font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.8rem;
            letter-spacing: 0.1em; cursor: pointer; transition: all 0.3s ease;
            text-decoration: none; text-transform: uppercase;
        }
        .home-btn:hover {
            background: #C41E3A; border-color: #C41E3A; color: #ffffff; transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(196, 30, 58, 0.3);
        }
        .home-btn:active { transform: scale(0.98); }

        /* Scripture Footer */
        .scripture-footer {
            position: absolute; bottom: 30px; left: 0; right: 0; text-align: center;
            color: #4b5563; font-size: 0.7rem; font-weight: 500; font-style: italic; z-index: 10;
        }

        @media (max-width: 480px) {
            .cs-title { font-size: 2.5rem; }
            .cs-text { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="coming-soon-container">
        <!-- Logo (White version for dark background) -->
        <img src="images/logo.png" alt="ABC Global Logo" class="cs-logo">

        <!-- Minimalist Animated Dots -->
        <div class="cs-progress-wrapper">
            <div class="cs-dot active"></div>
            <div class="cs-dot active"></div>
            <div class="cs-dot"></div>
            <div class="cs-dot"></div>
            <div class="cs-dot"></div>
        </div>

        <!-- Text Content -->
        <h2 class="cs-title">Coming Soon</h2>
        <p class="cs-subtitle">Under Construction</p>
        <p class="cs-text">We are working on something great. This page will be available soon. Thank you for your patience!</p>

        <!-- Button -->
        <a href="index.html" class="home-btn">
            <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i>
            <span>Back to Home</span>
        </a>
    </div>

    <div class="scripture-footer">
        "But those who hope in the Lord will renew their strength." — Isaiah 40:31
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
