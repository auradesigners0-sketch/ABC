<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://stream.zeno.fm https://*.zeno.fm https://api.zeno.fm; media-src https://stream.zeno.fm https://*.zeno.fm https://zeno.fm; frame-src 'none';">
    <title>abcglobal</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="images/logicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="images/logicon16.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="images/favicon180.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="images/favicon192.ico">
    <link rel="icon" type="image/png" sizes="512x512" href="images/favicon512.ico">
    <!-- Preconnect to external domains for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://stream.zeno.fm">
    <!-- Load only the font weights actually used, with swap so text shows immediately -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide icons for SPA sub-pages (homepage uses inline SVGs for instant rendering) -->
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
        a, button, [role="button"], .glass-card, .hamburger, .back-nav, .mobile-give-btn, .play-btn-premium, .radio-screen, .desktop-bottom-nav a { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        html {
            height: 100%; scroll-behavior: smooth;
            overflow-x: hidden;
            overflow-y: auto;
            --scrollbar-width: none; /* Firefox - hide scrollbar */
            -ms-overflow-style: none; /* IE/Edge - hide scrollbar */
            /* Use 100% instead of 100vw to prevent scrollbar-induced layout shift */
            max-width: 100%;
        }
        html::-webkit-scrollbar { display: none; /* Chrome/Safari - hide scrollbar */ }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #E0E0E0;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            min-height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            --scrollbar-width: none; /* Firefox - hide scrollbar */
            -ms-overflow-style: none; /* IE/Edge - hide scrollbar */
            /* Use 100% instead of 100vw to prevent scrollbar-induced layout shift */
            max-width: 100%;
        }
        body::-webkit-scrollbar { display: none; /* Chrome/Safari - hide scrollbar */ }

        /* Prayer & Testimonies — scrollable but scrollbar hidden (like History) */
        body.spa-prayer,
        body.spa-testimonies {
            overflow-y: auto;
            overflow-x: hidden;
            --scrollbar-width: none;
            -ms-overflow-style: none;
        }
        body.spa-prayer::-webkit-scrollbar,
        body.spa-testimonies::-webkit-scrollbar { display: none; }
        body.spa-prayer #spa-content,
        body.spa-testimonies #spa-content {
            min-height: 100dvh !important;
            overflow-y: auto !important;
            overflow-x: hidden !important;
            --scrollbar-width: none !important;
            -ms-overflow-style: none !important;
        }
        body.spa-prayer #spa-content::-webkit-scrollbar,
        body.spa-testimonies #spa-content::-webkit-scrollbar { display: none !important; }

        /* ============================================
           SPA CONTENT AREA - Page content swaps here
           ============================================ */
        #spa-content {
            width: 100%;
            max-width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 0;
            overflow-x: hidden;
        }

        /* ============================================
           BODY GLOW (shared across all pages)
           ============================================ */
        body::before {
            content: '';
            position: fixed; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(196, 30, 58, 0.08) 0%, transparent 70%);
            border-radius: 50%; top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; z-index: 0;
            animation: fadeIn 1.5s ease-out 0s forwards, glowPulse 4s ease-in-out 1.5s infinite;
            opacity: 0;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 0.5; } }
        @keyframes glowPulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
        }

        /* --- Adjust body glow for dark pages and sub-pages --- */
        body.spa-connect::before,
        body.spa-branches::before,
        body.spa-history::before {
            background: radial-gradient(circle, rgba(196, 30, 58, 0.15) 0%, transparent 70%);
            top: 40%;
        }
        body.spa-giving::before,
        body.spa-testimonies::before,
        body.spa-prayer::before {
            top: 20%;
        }

        /* ============================================
           HOME PAGE STYLES (inside #spa-content)
           ============================================ */
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes slideFromTopRight { from { opacity: 0; transform: translate(20px, -20px); } to { opacity: 1; transform: translate(0, 0); } }
        @keyframes slideFromBottomCenter { from { opacity: 0; transform: translateX(-50%) translateY(50px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes slideFromRight { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }

        .main-logo-wrapper {
            position: relative; display: flex; align-items: center; justify-content: center;
            z-index: 10; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .main-logo-wrapper:focus {
            outline: none;
        }
        .logo-entry-wrapper {
            animation: fadeInScale 1s ease-out 0.2s forwards; opacity: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .main-logo-image {
            width: 320px; height: 320px; object-fit: contain;
            filter: drop-shadow(0 10px 25px rgba(0, 0, 0, 0.15)) drop-shadow(0 0 40px rgba(196, 30, 58, 0.15));
            animation: float 6s ease-in-out 1.2s infinite;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            pointer-events: none;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes orbitPulse {
            0%, 100% { opacity: 0.15; }
            50% { opacity: 0.4; }
        }

        .rings-container {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.8s forwards; opacity: 0;
        }
        .ring {
            position: absolute; border-radius: 50%; border: 1px solid rgba(196, 30, 58, 0.12);
            animation: ringPulse 5s ease-in-out infinite;
        }
        .ring-1 { width: 380px; height: 380px; animation-delay: 0s; }
        .ring-2 { width: 440px; height: 440px; animation-delay: 1.5s; }
        .ring-3 { width: 500px; height: 500px; animation-delay: 3s; }
        @keyframes ringPulse { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.02); } }

        .bottom-text { 
            position: absolute; 
            left: 50%;
            transform: translateX(-50%);
            bottom: -48px;
            text-align: center; z-index: 20; 
            white-space: nowrap;
            animation: slideUp 0.8s ease-out 1.4s forwards; opacity: 0;
        }
        .bottom-text p {
            font-family: 'Inter', sans-serif; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.1em; line-height: 1.6; color: #333333; font-size: 0.95rem;
        }
        .bottom-text .highlight { color: #C41E3A; font-weight: 700; }

        /* ============================================
           HAMBURGER TOGGLE (HOMEPAGE ONLY)
           ============================================ */
        .hamburger {
            position: fixed; top: 24px; right: 24px; width: 36px; height: 36px;
            display: none;
            grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr);
            gap: 5px; cursor: pointer; z-index: 10002; 
            animation: slideFromTopRight 0.8s ease-out 1.6s forwards; opacity: 0;
            transition: opacity 0.3s ease;
        }
        /* Force hidden when on sub-pages */
        body:not(.spa-home) .hamburger { display: none !important; opacity: 0 !important; pointer-events: none !important; }
        .hamburger div { 
            background: #333333; border-radius: 4px; 
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        .hamburger:hover div { background: #4a4a4a; }
        .hamburger.active div { background: #333333; }
        .hamburger.active div:nth-child(1) {
            transform: translateX(calc(100% + 5px)) scale(0);
            opacity: 0;
        }
        .hamburger.active div:nth-child(4) {
            transform: translateX(calc(-100% - 5px)) scale(0);
            opacity: 0;
        }
        /* (Hamburger is hidden on sub-pages — no color overrides needed) */

        /* ============================================
           DESKTOP BOTTOM NAV (HOMEPAGE ONLY)
           ============================================ */
        .desktop-bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: auto; max-width: 800px; height: 70px;
            background: rgba(15, 23, 42, 0.95); --backdrop-filter: blur(20px); --webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none; justify-content: center; align-items: center; gap: 28px; padding: 0 30px; z-index: 1000;
            animation: slideFromBottomCenter 0.8s ease-out 1.8s forwards; opacity: 0;
            transition: opacity 0.3s ease;
        }
        /* Force hidden when on sub-pages */
        body:not(.spa-home) .desktop-bottom-nav { display: none !important; opacity: 0 !important; pointer-events: none !important; }
        .desktop-bottom-nav a {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-decoration: none; color: #e5e7eb; transition: all 0.3s ease; padding: 8px 10px; border-radius: 12px;
            cursor: pointer;
        }
        .desktop-bottom-nav a svg { margin-bottom: 4px; color: #ffffff; transition: color 0.3s ease; }
        .desktop-bottom-nav a span { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .desktop-bottom-nav a:hover { background: rgba(196, 30, 58, 0.15); color: #ffffff; transform: translateY(-3px); }
        .desktop-bottom-nav a:hover svg { color: #C41E3A; }
        .desktop-bottom-nav a.active-nav { background: rgba(196, 30, 58, 0.2); color: #ffffff; }
        .desktop-bottom-nav a.active-nav svg { color: #ffffff; }

        /* ============================================
           FLOATING WIDGETS — RADIO + GIVE BTN (HOMEPAGE ONLY)
           ============================================ */
        .floating-widgets {
            position: fixed; bottom: 100px; right: 20px;
            display: flex; flex-direction: column; gap: 12px;
            z-index: 999; align-items: center;
            animation: slideFromRight 0.8s ease-out 2s forwards; opacity: 0;
            transition: opacity 0.3s ease;
        }
        /* Force hidden when on sub-pages */
        body:not(.spa-home) .floating-widgets { display: none !important; opacity: 0 !important; pointer-events: none !important; }
        .mobile-give-btn {
            display: none; align-items: center; justify-content: center; gap: 10px;
            background: #C41E3A; color: #ffffff; padding: 14px 28px; border-radius: 50px;
            text-decoration: none; font-weight: 800; font-size: 0.9rem; letter-spacing: 0.5px;
            box-shadow: 0 10px 40px rgba(196, 30, 58, 0.3); transition: all 0.3s ease; order: 1;
            cursor: pointer; opacity: 0;
        }
        .mobile-give-btn:hover, .mobile-give-btn:active { background: #a1182e; transform: translateY(-2px); box-shadow: 0 15px 50px rgba(196, 30, 58, 0.4); }
        /* Give button entry animation on mobile (appears first) */
        @keyframes giveBtnSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Radio player entry animation on mobile (appears after give button) */
        @keyframes radioSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ============================================
           RADIO PLAYER (PERSISTENT - NEVER DESTROYED)
           ============================================ */
        .radio-player-premium {
            width: 300px; height: 90px; background: #ffffff; border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.05);
            display: flex; overflow: hidden; transition: all 0.3s ease; order: 2; opacity: 0;
        }
        .radio-player-premium:hover { box-shadow: 0 15px 50px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.05); transform: translateY(-2px); }
        .radio-screen { width: 90px; height: 100%; background: #050a14; position: relative; flex-shrink: 0; cursor: pointer; transition: box-shadow 0.3s ease; }
        .radio-screen:hover { box-shadow: inset 0 0 20px rgba(196, 30, 58, 0.2); }
        .visualizer-canvas { width: 100%; height: 100%; display: block; }
        .pause-overlay {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.35); opacity: 0; transition: opacity 0.3s ease; color: white; pointer-events: none;
            --backdrop-filter: blur(2px); --webkit-backdrop-filter: blur(2px);
        }
        .radio-screen:hover .pause-overlay { opacity: 1; }
        .pause-overlay svg { width: 20px; height: 20px; opacity: 0.8; }
        .radio-details { flex: 1; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; }
        .radio-info { display: flex; flex-direction: column; gap: 4px; }
        .radio-title { font-size: 0.9rem; font-weight: 800; color: #111827; letter-spacing: 0.2px; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
        .radio-status {
            font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; 
            display: flex; align-items: center; gap: 6px; transition: color 0.3s ease;
        }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; transition: background 0.3s ease, box-shadow 0.3s ease; }
        .status-offline { color: #9ca3af; }
        .status-connecting { color: #f59e0b; }
        .status-connecting .status-dot { box-shadow: 0 0 8px rgba(245, 158, 11, 0.6); animation: blink 0.8s infinite; }
        .status-live { color: #ef4444; }
        .status-live .status-dot { box-shadow: 0 0 8px rgba(239, 68, 68, 0.6); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .play-btn-premium {
            width: 40px; height: 40px; border-radius: 50%; background: #111827; border: none; color: #ffffff;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(17, 24, 39, 0.2);
        }
        .play-btn-premium:hover { background: #C41E3A; transform: scale(1.1); box-shadow: 0 4px 16px rgba(196, 30, 58, 0.4); }
        .play-btn-premium:active { transform: scale(0.95); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-icon { animation: spin 1s linear infinite; }

        /* ============================================
           RIPPLE CONTAINER (HOMEPAGE ONLY)
           ============================================ */
        body:not(.spa-home) .ripple-container { display: none !important; }

        /* ============================================
           MENU OVERLAY — GLASSMORPHIC GRID (HOMEPAGE ONLY)
           ============================================ */
        body:not(.spa-home) .menu-overlay { pointer-events: none !important; }
        .menu-overlay {
            position: fixed; inset: 0; z-index: 9000;
            background: linear-gradient(170deg, #EDEDED 0%, #E0E0E0 40%, #D8D8D8 100%);
            --backdrop-filter: blur(20px);
            --webkit-backdrop-filter: blur(20px);
            opacity: 0; pointer-events: none; display: none; 
            transition: opacity 0.5s ease;
        }
        .menu-overlay.active { opacity: 1; pointer-events: auto; }
        .close-btn { display: none; }

        /* Ambient glow behind the menu — subtle red warmth on light bg */
        .menu-overlay::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(196, 30, 58, 0.07) 0%, rgba(196, 30, 58, 0.03) 40%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: menuGlowPulse 6s ease-in-out infinite;
        }
        .menu-overlay::after {
            content: '';
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(196, 30, 58, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: menuGlowPulse 4s ease-in-out 2s infinite;
        }
        @keyframes menuGlowPulse {
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.04); }
        }

        /* Glass menu container — centered flex column */
        .glass-menu-container {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px 40px 24px;
            overflow-y: auto;
            z-index: 1;
        }

        /* Logo at top */
        .glass-menu-logo {
            margin-bottom: 36px;
            transform: translateY(-30px) scale(0.8);
            opacity: 0;
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease;
        }
        .menu-overlay.active .glass-menu-logo {
            transform: translateY(0) scale(1);
            opacity: 1;
            transition-delay: 0.15s;
        }
        .glass-logo-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.15)) drop-shadow(0 0 20px rgba(196, 30, 58, 0.2));
        }

        /* 2-column grid */
        .glass-menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            width: 100%;
            max-width: 340px;
            margin-bottom: 32px;
        }

        /* Individual glass card — dark gray on light bg */
        .glass-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 22px 12px;
            border-radius: 18px;
            background: rgba(55, 65, 81, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.08);
            --backdrop-filter: blur(16px);
            --webkit-backdrop-filter: blur(16px);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            text-decoration: none;
            cursor: pointer;
            transform: translateY(40px) scale(0.9);
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease, background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .glass-card svg {
            width: 28px;
            height: 28px;
            color: rgba(255, 255, 255, 0.9);
            transition: color 0.3s ease, filter 0.3s ease, transform 0.3s ease;
            filter: none;
        }
        .glass-card span {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: rgba(255, 255, 255, 0.75);
            text-align: center;
            transition: color 0.3s ease;
        }

        /* Staggered entrance animations */
        .menu-overlay.active .node-1 { transform: translateY(0) scale(1); opacity: 1; transition-delay: 0.3s; }
        .menu-overlay.active .node-2 { transform: translateY(0) scale(1); opacity: 1; transition-delay: 0.38s; }
        .menu-overlay.active .node-3 { transform: translateY(0) scale(1); opacity: 1; transition-delay: 0.46s; }
        .menu-overlay.active .node-4 { transform: translateY(0) scale(1); opacity: 1; transition-delay: 0.54s; }
        .menu-overlay.active .node-5 { transform: translateY(0) scale(1); opacity: 1; transition-delay: 0.62s; }
        .menu-overlay.active .node-6 { transform: translateY(0) scale(1); opacity: 1; transition-delay: 0.7s; }

        /* Hover: glass card flares with red accent */
        .glass-card:hover {
            background: rgba(196, 30, 58, 0.85);
            border-color: rgba(196, 30, 58, 0.6);
            box-shadow: 0 8px 28px rgba(196, 30, 58, 0.25), 0 0 20px rgba(196, 30, 58, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: translateY(-3px) scale(1) !important;
        }
        .glass-card:hover svg {
            color: #ffffff;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.5));
            transform: scale(1.1);
        }
        .glass-card:hover span { color: #ffffff; }

        /* Active press */
        .glass-card:active {
            transform: scale(0.96) !important;
            background: rgba(196, 30, 58, 0.95);
            border-color: rgba(196, 30, 58, 0.8);
            box-shadow: 0 4px 16px rgba(196, 30, 58, 0.3);
        }

        /* Verse at bottom */
        .glass-menu-verse {
            text-align: center;
            color: rgba(80, 80, 80, 0.55);
            font-size: 0.78rem;
            font-weight: 500;
            font-style: italic;
            max-width: 290px;
            line-height: 1.7;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .menu-overlay.active .glass-menu-verse {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.9s;
        }

        /* ============================================
           SHOCKWAVE RIPPLE
           ============================================ */
        .ripple-container { position: fixed; inset: 0; pointer-events: none; z-index: 9999; overflow: hidden; }

            width: 40vmin; padding-bottom: 40vmin; border-radius: 50%; pointer-events: none;
            box-shadow: 0 0 10px 2px rgba(196, 30, 58, 0.3);
        }
        @keyframes rippleExpand {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0.8; border-width: 4px; background: rgba(196, 30, 58, 0.15); }

        }

        .ripple-2 { border: 3px solid rgba(196, 30, 58, 0.6); animation: rippleExpand 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards; }

        @keyframes ringShock { 0% { transform: scale(1); opacity: 0.2; } 20% { transform: scale(1.15); opacity: 0.9; } 100% { transform: scale(1); opacity: 0.2; } }
        .ring.shocked { animation: ringShock 0.6s ease forwards !important; }
        @keyframes iconShock { 0% { transform: translateX(0); } 20% { transform: translateX(-20px); } 100% { transform: translateX(0); } }
        /* Widget children shock - works on all screen sizes without breaking centering */
        @keyframes widgetShock { 0% { transform: translateY(0); } 20% { transform: translateY(15px); } 100% { transform: translateY(0); } }
        .mobile-give-btn.shocked { animation: widgetShock 0.5s ease forwards !important; }
        .radio-player-premium.shocked { animation: widgetShock 0.5s ease forwards !important; }
        @keyframes bottomShock { 0% { transform: translateX(-50%) translateY(0); } 20% { transform: translateX(-50%) translateY(15px); } 100% { transform: translateX(-50%) translateY(0); } }
        .bottom-text.shocked { animation: bottomShock 0.5s ease forwards; }

        @keyframes hamburgerShock { 0% { transform: translate(0); } 20% { transform: translate(-15px, 15px); } 100% { transform: translate(0); } }

            </div>
            <section class="bottom-text shockwave-affected">
                <p>RAISING A FIREBRAND GENERATION<br><span class="highlight">HOLY UNTO GOD</span></p>
            </section>
        </main>
    </div>

    <!-- ============================================
         SCRIPTS (PERSISTENT - NEVER DESTROYED)
         ============================================ -->
    <script>
        // --- ICON INITIALIZATION ---
        // Homepage icons are inline SVGs (no Lucide dependency for instant rendering).
        // Lucide is still needed for SPA-loaded sub-page content.
        function initLucide() {
            if (typeof lucide !== 'undefined' && lucide.createIcons) {
                try { lucide.createIcons(); } catch(e) {}
            }
        }
        // Run immediately for any remaining data-lucide elements, and retry if library not yet loaded
        initLucide();
        document.addEventListener('DOMContentLoaded', initLucide);

        // --- MENU LOGIC ---
        const hamburger = document.getElementById('hamburger');
        const overlay = document.getElementById('menuOverlay');
        const nodes = document.querySelectorAll('.glass-card');

        function openMenu() {
            overlay.style.display = 'block'; 
            void overlay.offsetWidth;
            overlay.classList.add('active'); 
            hamburger.classList.add('active');
            document.body.style.overflow = 'hidden'; 
        }
        
        function closeMenu() {
            overlay.classList.remove('active'); 
            hamburger.classList.remove('active');
            document.body.style.overflow = ''; 
            setTimeout(() => { 
                if(!overlay.classList.contains('active')) { overlay.style.display = 'none'; } 
            }, 800);
        }
        
        if(hamburger) {
            hamburger.addEventListener('click', function() {
                if (overlay.classList.contains('active')) {
                    closeMenu();
                } else {
                    openMenu();
                }
            });
        }

        nodes.forEach(node => node.addEventListener('click', closeMenu));

        // Expose closeMenu globally so SPA router can call it
        window.closeMenu = closeMenu;

        // --- RADIO & VISUALIZER (PERSISTENT - NEVER DESTROYED) ---
        const audio = document.getElementById('radioStream');
        const radioScreen = document.getElementById('radioScreen');
        const radioPlayBtn = document.getElementById('radioPlayBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const loadingIcon = document.getElementById('loadingIcon');
        const radioStatus = document.getElementById('radioStatus');
        const statusText = document.getElementById('statusText');
        const radioTitle = document.getElementById('radioTitle');
        
        const canvas = document.getElementById('visualizerCanvas');
        const ctx = canvas.getContext('2d');
        const numBars = 24;
        let bars = [];
        for(let i=0; i<numBars; i++) { bars.push({ height: 0, targetHeight: 0 }); }

        const resizeObserver = new ResizeObserver(entries => {
            for (let entry of entries) { if (entry.target === radioScreen) { canvas.width = canvas.offsetWidth * 2; canvas.height = canvas.offsetHeight * 2; } }
        });
        resizeObserver.observe(radioScreen);

        // ====== REAL AUDIO FREQUENCY ANALYZER ======
        // Connects Web Audio API AnalyserNode to the radio stream
        // so the visualizer bars move with the actual music frequencies.
        let audioCtx = null;
        let analyser = null;
        let audioSource = null;
        let realFreqData = null;     // Uint8Array from analyser
        let useRealAnalyser = false; // true if Web Audio API connected successfully

        function initAudioAnalyser() {
            if (audioCtx) return; // Already initialized
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 64;           // Gives 32 frequency bins (we use 24)
                analyser.smoothingTimeConstant = 0.75; // Smooth transitions
                analyser.minDecibels = -90;
                analyser.maxDecibels = -10;
                audioSource = audioCtx.createMediaElementSource(audio);
                audioSource.connect(analyser);
                analyser.connect(audioCtx.destination);
                realFreqData = new Uint8Array(analyser.frequencyBinCount);
                useRealAnalyser = true;
            } catch (err) {
                // CORS or browser blocks MediaElementSource — fallback to simulated
                console.warn('Web Audio API not available for stream (CORS). Using simulated visualizer.', err);
                useRealAnalyser = false;
            }
        }

        // ====== VISUALIZER DRAW ======
        let visualizerRunning = false;
        function drawVisualizer() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (canvas.width === 0 || canvas.height === 0) {
                // Canvas is hidden (widget display:none on sub-pages).
                // Mark loop as stopped so it can be restarted when visible again.
                visualizerRunning = false;
                return;
            }
            const isPlaying = !audio.paused;
            const barWidth = canvas.width / numBars;
            const maxBarHeight = canvas.height * 0.88;
            let allBarsSettled = true;

            // Get real frequency data if available
            if (useRealAnalyser && analyser && isPlaying) {
                analyser.getByteFrequencyData(realFreqData);
            }

            for (let i = 0; i < numBars; i++) {
                if (isPlaying) {
                    if (useRealAnalyser && realFreqData) {
                        // REAL frequency data from Web Audio API
                        // Map our 24 bars to the 32 frequency bins (skip very low bins)
                        const binIndex = Math.floor((i + 2) * (realFreqData.length - 2) / numBars);
                        const freqValue = realFreqData[binIndex] || 0;
                        // freqValue is 0-255, normalize to 0-1
                        const normalized = freqValue / 255;
                        bars[i].targetHeight = Math.max(maxBarHeight * 0.08, normalized * maxBarHeight);
                    } else {
                        // SIMULATED fallback (random with center emphasis)
                        const centerFactor = 1 - Math.abs(i - numBars/2) / (numBars/2);
                        const dynamicHeight = (Math.random() * 0.6 + 0.4) * maxBarHeight * (centerFactor * 0.5 + 0.5);
                        bars[i].targetHeight = dynamicHeight;
                    }
                } else {
                    bars[i].targetHeight = canvas.height * 0.04;
                }

                // Smooth transition toward target
                bars[i].height += (bars[i].targetHeight - bars[i].height) * (useRealAnalyser ? 0.25 : 0.15);
                if (!isPlaying && Math.abs(bars[i].height - bars[i].targetHeight) > 0.5) { allBarsSettled = false; }

                const x = i * barWidth;
                const h = Math.max(2, bars[i].height);
                const y = canvas.height - h;

                // Gradient: church red on top, deep blue on bottom
                const gradient = ctx.createLinearGradient(x, y, x, canvas.height);
                gradient.addColorStop(0, '#C41E3A');
                gradient.addColorStop(0.4, '#ef4444');
                gradient.addColorStop(1, '#1e3a8a');
                ctx.fillStyle = gradient;
                // Draw bar with rounded top
                const barRadius = Math.min(barWidth * 0.3, 4);
                ctx.beginPath();
                ctx.moveTo(x + 1, canvas.height);
                ctx.lineTo(x + 1, y + barRadius);
                ctx.quadraticCurveTo(x + 1, y, x + 1 + barRadius, y);
                ctx.lineTo(x + barWidth - 1 - barRadius, y);
                ctx.quadraticCurveTo(x + barWidth - 1, y, x + barWidth - 1, y + barRadius);
                ctx.lineTo(x + barWidth - 1, canvas.height);
                ctx.closePath();
                ctx.fill();

                // Bright highlight on top of each bar
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fillRect(x + 1, y, barWidth - 2, 2);
            }
            if (isPlaying || !allBarsSettled) { requestAnimationFrame(drawVisualizer); } else { visualizerRunning = false; }
        }
        function startVisualizerLoop() {
            if (!visualizerRunning) {
                visualizerRunning = true;
                // Ensure canvas dimensions are correct before drawing
                if (canvas.offsetWidth > 0 && canvas.offsetHeight > 0) {
                    canvas.width = canvas.offsetWidth * 2;
                    canvas.height = canvas.offsetHeight * 2;
                }
                drawVisualizer();
            }
        }

        function setConnectingState() { playIcon.style.display = 'none'; pauseIcon.style.display = 'none'; loadingIcon.style.display = 'block'; radioStatus.className = 'radio-status status-connecting'; statusText.innerText = 'Connecting'; }
        function setLiveState() { playIcon.style.display = 'none'; pauseIcon.style.display = 'block'; loadingIcon.style.display = 'none'; radioStatus.className = 'radio-status status-live'; statusText.innerText = 'Live'; startVisualizerLoop(); }
        function setOfflineState() { playIcon.style.display = 'block'; pauseIcon.style.display = 'none'; loadingIcon.style.display = 'none'; radioStatus.className = 'radio-status status-offline'; statusText.innerText = 'Offline'; startVisualizerLoop(); }

        function playRadio() {
            // Initialize Web Audio API on first user click (required by browsers)
            initAudioAnalyser();
            // Resume AudioContext if it was suspended (browser autoplay policy)
            if (audioCtx && audioCtx.state === 'suspended') { audioCtx.resume(); }
            setConnectingState(); 
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => { setLiveState(); }).catch(error => { console.error("Radio playback failed:", error); setOfflineState(); });
            }
        }
        function pauseRadio() { audio.pause(); setOfflineState(); }

        radioPlayBtn.addEventListener('click', (e) => { e.stopPropagation(); if (audio.paused) { playRadio(); } else { pauseRadio(); } });
        radioScreen.addEventListener('click', (e) => { if (e.target === radioScreen || e.target === canvas || e.target.closest('.pause-overlay')) { if (!audio.paused) { pauseRadio(); } } });
        audio.addEventListener('pause', () => { if (pauseIcon.style.display === 'block') { setOfflineState(); } });
        audio.addEventListener('playing', () => { if (loadingIcon.style.display === 'block' || playIcon.style.display === 'block') { setLiveState(); } });

        // --- FETCH NOW PLAYING ---
        const streamId = 'tvb2jrc38hmuv';
        const apiEndpoint = `https://api.zeno.fm/mediastation/${streamId}/track_current`;
        
        async function fetchNowPlaying() {
            try {
                const response = await fetch(apiEndpoint);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                if (data && data.data && data.data.track && data.data.track.title) {
                    radioTitle.innerText = data.data.track.title;
                } else {
                    radioTitle.innerText = "ABC GLOBAL";
                }
            } catch (error) {
                radioTitle.innerText = "ABC GLOBAL";
            }
        }
        fetchNowPlaying();
        setInterval(fetchNowPlaying, 10000);

        // --- SHOCKWAVE RIPPLE LOGIC (Event Delegation - works after SPA nav) ---
        const rippleContainer = document.getElementById('ripple-container');
        let shockwaveCooldown = false;

        function triggerShockwave() {
            if (shockwaveCooldown) return;
            shockwaveCooldown = true;
            setTimeout(() => shockwaveCooldown = false, 1000);

            // Find the logo's center position on screen for accurate ripple origin
            const logoEl = document.querySelector('.main-logo-image') || document.getElementById('logoWrapper');
            let rippleX = window.innerWidth / 2;
            let rippleY = window.innerHeight * 0.45;
            if (logoEl) {
                const rect = logoEl.getBoundingClientRect();
                rippleX = rect.left + rect.width / 2;
                rippleY = rect.top + rect.height / 2;
            }

            // Create 3 ripple rings positioned at logo center
            for(let i = 1; i <= 3; i++) {
                const ripple = document.createElement('div');
                ripple.classList.add('ripple', `ripple-${i}`);
                ripple.style.left = rippleX + 'px';
                ripple.style.top = rippleY + 'px';
                rippleContainer.appendChild(ripple);
                setTimeout(() => { ripple.remove(); }, 900);
            }

            // Shock the logo wrapper (always fresh lookup)
            const logoWrapper = document.getElementById('logoWrapper');
            if (logoWrapper) {
                logoWrapper.classList.add('shocked');
                setTimeout(() => logoWrapper.classList.remove('shocked'), 500);
            }

            // Shock all other shockwave-affected elements (always fresh lookup)
            const affectedElements = document.querySelectorAll('.shockwave-affected');
            affectedElements.forEach(el => {
                if (el.id === 'logoWrapper') return;
                setTimeout(() => {
                    el.classList.add('shocked');
                    setTimeout(() => { el.classList.remove('shocked'); }, 600);
                }, 100);
            });
        }

        // Use event delegation on #spa-content so it works even after content swaps
        document.getElementById('spa-content').addEventListener('click', function(e) {
            const logoWrapper = e.target.closest('.main-logo-wrapper');
            if (logoWrapper) {
                e.preventDefault();
                triggerShockwave();
            }
        });

        // --- ACTIVE NAV HIGHLIGHTING ---
        function updateActiveNav(pageName) {
            // Desktop nav
            document.querySelectorAll('#desktopNav a').forEach(a => {
                a.classList.toggle('active-nav', a.getAttribute('data-page') === pageName);
            });
        }
        // Listen for SPA navigation — close menu on every navigation
        window.addEventListener('spa-navigate', function(e) {
            if (e.detail && e.detail.page) {
                updateActiveNav(e.detail.page);
            }
            // Always close menu when SPA navigates
            if (typeof closeMenu === 'function') { closeMenu(); }

            // === FIX: Restart visualizer when returning to home ===
            // When navigating away from home, the radio widget gets display:none,
            // which makes the canvas 0x0. The drawVisualizer() function returns
            // early and sets visualizerRunning=false. When returning to home,
            // we must wait for the widget to become visible again, resize the
            // canvas, and restart the visualizer loop.
            if (e.detail && e.detail.page === 'home') {
                // Use requestAnimationFrame to ensure the DOM has updated
                // and the widget is visible before measuring canvas size
                requestAnimationFrame(function() {
                    setTimeout(function() {
                        if (canvas.offsetWidth > 0 && canvas.offsetHeight > 0) {
                            canvas.width = canvas.offsetWidth * 2;
                            canvas.height = canvas.offsetHeight * 2;
                        }
                        startVisualizerLoop();
                    }, 150);
                });
            }
        });
    </script>

    <!-- SPA Router (loads last, handles all navigation) -->
    <script src="spa-router.js"></script>
</body>
