<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Give - ABC GLOBAL Church</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { 
            height: 100%; 
            scroll-behavior: smooth; 
            overflow-x: hidden;
            overflow-y: auto;
            scrollbar-width: none; /* Firefox - hide scrollbar */
            -ms-overflow-style: none; /* IE/Edge - hide scrollbar */
        }
        html::-webkit-scrollbar { display: none; /* Chrome/Safari - hide scrollbar */ }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #E0E0E0;
            display: flex; flex-direction: column; align-items: center;
            position: relative; min-height: 100%; 
            overflow-x: hidden;
            padding: 20px 20px 60px 20px;
        }

        body::before {
            content: ''; position: fixed; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(196, 30, 58, 0.08) 0%, transparent 70%);
            border-radius: 50%; top: 20%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 0;
        }

        /* Back Button */
        .back-nav {
            position: fixed; top: 24px; left: 24px; z-index: 100;
            display: flex; align-items: center; gap: 8px;
            text-decoration: none; color: #333333; font-weight: 700; font-size: 0.9rem;
            background: rgba(255,255,255,0.8); padding: 10px 18px; border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: all 0.3s ease;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }
        .back-nav:hover { background: #ffffff; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); color: #C41E3A; }

        /* Main Container */
        .give-container {
            width: 100%; max-width: 600px; position: relative; z-index: 10;
            animation: fadeInUp 0.6s ease-out forwards; 
            opacity: 0;
            will-change: transform, opacity;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }
        @keyframes fadeInUp { 
            from { opacity: 0; transform: translate3d(0, 20px, 0); } 
            to { opacity: 1; transform: translate3d(0, 0, 0); } 
        }

        /* Top Logo */
        .top-logo {
            width: 80px; height: 80px; object-fit: contain; margin: 30px auto 20px auto; display: block;
            filter: drop-shadow(0 4px 10px rgba(196, 30, 58, 0.2));
            animation: fadeInUp 0.6s ease-out 0.1s forwards;
            opacity: 0;
        }

        /* Header */
        .give-header { 
            text-align: center; margin-bottom: 30px; 
            animation: fadeInUp 0.6s ease-out 0.2s forwards;
            opacity: 0;
        }
        .give-header h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: #111827; line-height: 1.1; }
        .give-header h2 { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 0.95rem; color: #C41E3A; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 8px; }

        /* Tabs */
        .tabs {
            display: flex; background: #d1d5db; border-radius: 16px; padding: 5px; margin-bottom: 30px;
            position: relative; z-index: 10;
            animation: fadeInUp 0.6s ease-out 0.3s forwards;
            opacity: 0;
        }
        .tab-btn {
            flex: 1; padding: 14px; border: none; background: transparent; border-radius: 12px;
            font-family: 'Inter', sans-serif; font-weight: 800; font-size: 0.9rem; letter-spacing: 0.05em;
            color: #6b7280; cursor: pointer; transition: all 0.3s ease;
        }
        .tab-btn.active { 
            background: #C41E3A; color: #ffffff; 
            box-shadow: 0 8px 20px rgba(196, 30, 58, 0.3); 
        }
        .tab-btn:hover:not(.active) { color: #111827; }

        /* Tab Content */
        .tab-content { display: none; }
        .tab-content.active { 
            display: block; 
            animation: fadeIn 0.35s ease; 
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Split Layout Payment Cards */
        .payment-card {
            display: flex;
            background: #ffffff; 
            border-radius: 0px; 
            margin-bottom: 16px;
            cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-height: 90px;
            will-change: transform;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }
        .payment-card:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 8px 24px rgba(0,0,0,0.2); 
        }
        .payment-card:active { transform: scale(0.98); }
        
        /* 40% Left Container for Logo */
        .card-logo-container {
            width: 40%; 
            display: flex; align-items: center; justify-content: center;
            padding: 15px; 
            flex-shrink: 0;
            background: #ffffff;
        }
        
        /* Specific Colors for the 40% Left Side */
        .card-voda .card-logo-container { background: #ffffff; } 
        .card-tigo .card-logo-container { background: #FFD100; } 
        .card-crdb .card-logo-container { background: #ffffff; } 

        .card-logo {
            width: 100%; 
            height: auto;
            max-height: 60px; 
            object-fit: contain; 
        }

        /* Right Container for Info (Now flex: 1 to share space with copy icon) */
        .payment-info { 
            flex: 1; 
            min-width: 0; /* Prevents text overflow */
            padding: 14px 0 14px 18px; 
            display: flex; flex-direction: column; gap: 2px; justify-content: center;
        }
        .payment-type { font-weight: 800; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .payment-number { font-weight: 800; font-size: 1.15rem; letter-spacing: 1px; line-height: 1.2; color: #111827; }
        .payment-name { font-size: 0.7rem; font-weight: 600; color: #6b7280; margin-top: 2px; }

        /* Copy Icon Indicator */
        .copy-icon-area { 
            color: #9ca3af; 
            transition: color 0.3s ease; 
            opacity: 0.6; 
            flex-shrink: 0; 
            align-self: center; 
            padding-left: 12px; /* Added left padding here */
            padding-right: 15px; /* Right padding for spacing */
        }
        .payment-card:hover .copy-icon-area { opacity: 1; color: #C41E3A; }

        /* Brand Colors applied to Type Text */
        .card-voda .payment-type { color: #D2001C; } 
        .card-tigo .payment-type { color: #1a1a6c; } 
        .card-crdb .payment-type { color: #006B3F; } 

        /* Copy Prompt */
        .copy-prompt {
            text-align: center; margin-top: 30px; color: #6b7280; font-size: 0.85rem; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* Toast Notification */
        .toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: #111827; color: #ffffff; padding: 14px 24px; border-radius: 50px;
            font-weight: 700; font-size: 0.9rem; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 9999;
            display: flex; align-items: center; gap: 10px; border: 1px solid rgba(196, 30, 58, 0.3);
            white-space: nowrap;
        }
        .toast.show { bottom: 30px; }

        @media (max-width: 480px) {
            .give-header h1 { font-size: 1.8rem; }
            .payment-number { font-size: 1rem; }
            .card-logo-container { padding: 10px; }
            .payment-info { padding: 12px 0 12px 14px; }
            .copy-icon-area { padding-left: 8px; padding-right: 10px; }
        }
    </style>
</head>
<body>

    <!-- Back Button -->
    <a href="/" class="back-nav">
        <i data-lucide="arrow-left" style="width: 20px; height: 20px;"></i>
        <span>Back</span>
    </a>

    <div class="give-container">
        <!-- Top Logo -->
        <img src="images/logo.png" alt="ABC Global Logo" class="top-logo" loading="lazy">

        <div class="give-header">
            <h1>Give Cheerfully</h1>
            <h2>Tithes & Offerings</h2>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="mobile">Mobile</button>
            <button class="tab-btn" data-tab="bank">Bank</button>
        </div>

        <!-- MOBILE TAB -->
        <div id="mobile" class="tab-content active">
            
            <!-- Voda / M-Pesa Card -->
            <div class="payment-card card-voda" data-copy="0799016898">
                <div class="card-logo-container">
                    <img src="images/mpesa.png" alt="M-Pesa Logo" class="card-logo" loading="lazy">
                </div>
                <div class="payment-info">
                    <span class="payment-type">Voda / M-Pesa</span>
                    <span class="payment-number">0799 016 898</span>
                    <span class="payment-name">ABC GLOBAL MEDIA</span>
                </div>
                <div class="copy-icon-area"><i data-lucide="copy" style="width: 18px; height: 18px;"></i></div>
            </div>

            <!-- Tigo / Mixx Card -->
            <div class="payment-card card-tigo" data-copy="0775887591">
                <div class="card-logo-container">
                    <img src="images/mix.png" alt="Mixx By Yas Logo" class="card-logo" loading="lazy">
                </div>
                <div class="payment-info">
                    <span class="payment-type">Tigo / Mixx</span>
                    <span class="payment-number">0775 887 591</span>
                    <span class="payment-name">ABC GLOBAL MEDIA</span>
                </div>
                <div class="copy-icon-area"><i data-lucide="copy" style="width: 18px; height: 18px;"></i></div>
            </div>

            <div class="copy-prompt">
                <i data-lucide="info" style="width: 16px; height: 16px;"></i>
                Tap any card to copy the payment number
            </div>
        </div>

        <!-- BANK TAB -->
        <div id="bank" class="tab-content">
            
            <!-- CRDB Bank Card -->
            <div class="payment-card card-crdb" data-copy="10369920068">
                <div class="card-logo-container">
                    <img src="images/crdb.png" alt="CRDB Bank Logo" class="card-logo" loading="lazy">
                </div>
                <div class="payment-info">
                    <span class="payment-type">CRDB Bank</span>
                    <span class="payment-number">1036 9920 068</span>
                    <span class="payment-name">ABC GLOBAL MEDIA</span>
                </div>
                <div class="copy-icon-area"><i data-lucide="copy" style="width: 18px; height: 18px;"></i></div>
            </div>

            <div class="copy-prompt">
                <i data-lucide="info" style="width: 16px; height: 16px;"></i>
                Tap card to copy the account number
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i data-lucide="check-circle" style="width: 20px; height: 20px; color: #10b981;"></i>
        <span id="toast-message">Copied!</span>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Tab Switching Logic
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                const tabId = btn.getAttribute('data-tab');
                document.getElementById(tabId).classList.add('active');
            });
        });

        // Copy to Clipboard Logic with Fallback
        const paymentCards = document.querySelectorAll('.payment-card');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');

        function fallbackCopyTextToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.top = "-1000px";
            textArea.style.left = "-1000px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                document.execCommand('copy');
                showToast(`Copied: ${text}`);
            } catch (err) {
                showToast('Failed to copy');
            }

            document.body.removeChild(textArea);
        }

        function showToast(message) {
            toastMessage.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        paymentCards.forEach(card => {
            card.addEventListener('click', () => {
                const numberToCopy = card.getAttribute('data-copy');
                
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(numberToCopy).then(() => {
                        showToast(`Copied: ${numberToCopy}`);
                    }).catch(() => {
                        fallbackCopyTextToClipboard(numberToCopy);
                    });
                } else {
                    fallbackCopyTextToClipboard(numberToCopy);
                }
            });
        });
    </script>
</body>
</html>
